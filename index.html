<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDNS Pro · ProxyIP Manager</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <header class="topbar">
    <div><h1>DDNS Pro</h1><p>ProxyIP Manager · Worker Admin</p></div>
    <div class="top-actions"><button id="btnRefreshAll" class="primary">刷新</button><button id="btnLogout">退出</button></div>
  </header>
  <main class="layout">
    <section class="card wide">
      <div class="card-title"><h2>IP 池管理</h2><div class="inline"><input id="poolKey" value="pool" placeholder="pool / pool_xxx" /><button id="btnLoadPool">加载</button><button id="btnCreatePool">创建池</button><button id="btnDeletePool" class="danger">删除池</button></div></div>
      <div class="meta">当前数量：<b id="poolCount">-</b></div>
      <textarea id="poolText" spellcheck="false" placeholder="每行一个 IP，例如：1.1.1.1:443"></textarea>
      <div class="actions"><button id="btnAppend" class="primary">追加保存</button><button id="btnReplace">覆盖保存</button><button id="btnRemove" class="danger">删除这些 IP</button><button id="btnLoadTrash">查看垃圾桶</button><button id="btnClearTrash" class="danger">清空垃圾桶</button></div>
    </section>
    <section class="card"><h2>单个 ProxyIP 检测</h2><input id="checkIp" placeholder="1.1.1.1:443" /><div class="actions"><button id="btnCheckIp" class="primary">检测</button><label><input type="checkbox" id="useBackup" /> 使用备用接口</label></div><pre id="checkResult" class="result"></pre></section>
    <section class="card"><h2>域名状态</h2><input id="targetIndex" value="0" placeholder="target index" /><div class="actions"><button id="btnStatus" class="primary">查询状态</button></div><pre id="statusResult" class="result"></pre></section>
    <section class="card"><h2>域名解析</h2><input id="lookupDomain" placeholder="example.com 或 txt@example.com" /><div class="actions"><button id="btnLookup" class="primary">查询</button></div><pre id="lookupResult" class="result"></pre></section>
    <section class="card wide"><div class="card-title"><h2>手动维护</h2><button id="btnMaintain" class="primary">立即维护</button></div><pre id="logs" class="logs"></pre></section>
    <section class="card wide"><div class="card-title"><h2>域名与 IP 池映射</h2><button id="btnLoadMapping">加载映射</button><button id="btnSaveMapping" class="primary">保存映射</button></div><p class="hint">JSON 格式，例如：{"example.com":"pool_us"}</p><textarea id="mappingText" spellcheck="false" class="small"></textarea></section>
  </main>
  <div id="toast" class="toast"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
