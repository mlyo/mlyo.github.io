<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · DDNS Pro</title>
  <style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1020;color:#e5e7eb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif}.box{width:min(420px,92vw);background:#111827;border:1px solid #263244;border-radius:18px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}h1{margin:0 0 8px;font-size:26px}p{margin:0 0 22px;color:#9ca3af}input{width:100%;padding:13px 14px;border-radius:12px;border:1px solid #374151;background:#0b1220;color:#fff;font-size:15px}button{width:100%;margin-top:14px;padding:13px;border:0;border-radius:12px;background:#2563eb;color:white;font-weight:700;cursor:pointer}.err{min-height:22px;margin-top:12px;color:#fca5a5;font-size:14px}.tip{margin-top:16px;font-size:13px;color:#6b7280;line-height:1.6}code{background:#0b1220;padding:2px 6px;border-radius:6px}</style>
</head>
<body>
  <form class="box" id="loginForm"><h1>DDNS Pro</h1><p>输入 Worker 的 AUTH_KEY 进入管理面板</p><input id="password" type="password" autocomplete="current-password" placeholder="AUTH_KEY" autofocus /><button type="submit">登录</button><div class="err" id="err"></div><div class="tip">登录成功后会写入 HttpOnly Cookie；之后直接访问 <code>/admin/</code> 即可。</div></form>
  <script>document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const err=document.getElementById('err');err.textContent='';const password=document.getElementById('password').value.trim();try{const res=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'password='+encodeURIComponent(password)});const data=await res.json().catch(()=>null);if(!res.ok||!data?.success)throw new Error(data?.error||data?.message||'登录失败');location.href='/admin/'}catch(ex){err.textContent=ex.message||'登录失败'}});</script>
</body>
</html>
